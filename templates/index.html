<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Обнаружение конфликтов</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
</head>

<body>
<div class="main">
<h1>Обнаружение конфликтов на камерах видеонаблюдения</h1>
<div class="upload">
<form action="/predict"
      method="post"
      enctype="multipart/form-data"
      id="myForm">

    <input type="file"
    class="file-btn"
        name="video"
        id="videoInput"
        accept="video/*">

    <button type="submit" class="submit-btn" id="submitBtn">
        Проверить видео
        <img src="/static/loading.gif" alt="Загрузка..." class="loading-gif">
    </button>

    <br><br>
</form>
</div>
<video
    id="preview"
    width="700"
    controls
    style="display: none;">
</video>
</div>
<script>

const videoInput = document.getElementById("videoInput");
const preview = document.getElementById("preview");

videoInput.addEventListener("change", function(e){

    const file = e.target.files[0];

    if(file){

        const url = URL.createObjectURL(file);

        preview.src = url;

        // Показываем блок видео
        preview.style.display = "block";

    } else {

        // Если файл сняли с выбора
        preview.style.display = "none";
        preview.removeAttribute("src");
        preview.load();
    }
});

    const form = document.getElementById('myForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', function(event) {
        // Добавляем класс, который включает гифку и меняет вид кнопки
        submitBtn.classList.add('is-loading');
});            
</script>
</body>
